<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document AI Service - Validação de Documentos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1em;
        }

        .content {
            padding: 40px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        select, input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        select:focus, input[type="file"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }

        .file-input-label {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
            border: 2px dashed #667eea;
            border-radius: 6px;
            background: #f8f9ff;
            cursor: pointer;
            transition: all 0.3s;
        }

        .file-input-label:hover {
            background: #f0f2ff;
            border-color: #764ba2;
        }

        .file-input-label.dragover {
            background: #e8ebff;
            border-color: #764ba2;
        }

        .file-input-label svg {
            width: 40px;
            height: 40px;
            margin-right: 15px;
            color: #667eea;
        }

        .file-input-text {
            text-align: left;
        }

        .file-input-text p {
            margin: 0;
            color: #666;
        }

        .file-input-text .main {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        #fileInput {
            display: none;
        }

        .file-preview {
            margin-top: 15px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 6px;
            display: none;
        }

        .file-preview.show {
            display: block;
        }

        .file-preview img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 4px;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 14px 28px;
            border: none;
            border-radius: 6px;
            font-size: 1.05em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-validate {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-validate:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-validate:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-clear {
            background: #f0f0f0;
            color: #333;
        }

        .btn-clear:hover {
            background: #e0e0e0;
        }

        .results {
            margin-top: 40px;
            display: none;
        }

        .results.show {
            display: block;
        }

        .result-card {
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .result-card.approved {
            background: #e8f5e9;
            border-left: 5px solid #4caf50;
        }

        .result-card.manual {
            background: #fff3e0;
            border-left: 5px solid #ff9800;
        }

        .result-card.rejected {
            background: #ffebee;
            border-left: 5px solid #f44336;
        }

        .result-status {
            font-size: 1.8em;
            font-weight: 700;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .result-card.approved .result-status {
            color: #2e7d32;
        }

        .result-card.manual .result-status {
            color: #e65100;
        }

        .result-card.rejected .result-status {
            color: #c62828;
        }

        .confidence-bar {
            margin: 20px 0;
        }

        .confidence-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .bar {
            width: 100%;
            height: 30px;
            background: #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 0.9em;
            transition: width 0.5s ease;
        }

        .motivos {
            margin-top: 20px;
        }

        .motivos h4 {
            margin-bottom: 12px;
            color: #333;
            font-size: 1.05em;
        }

        .motivos ul {
            list-style: none;
        }

        .motivos li {
            padding: 8px 0;
            color: #555;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .motivos li:last-child {
            border-bottom: none;
        }

        .dados-extraidos {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.03);
            border-radius: 6px;
        }

        .dados-extraidos h4 {
            margin-bottom: 12px;
            color: #333;
            font-size: 1.05em;
        }

        .dados-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .dados-item:last-child {
            border-bottom: none;
        }

        .dados-label {
            font-weight: 600;
            color: #666;
        }

        .dados-value {
            color: #333;
            word-break: break-all;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 30px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #ffebee;
            border-left: 5px solid #f44336;
            padding: 20px;
            border-radius: 6px;
            color: #c62828;
            margin-top: 20px;
            display: none;
        }

        .error.show {
            display: block;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.5em;
            }

            .content {
                padding: 20px;
            }

            .button-group {
                flex-direction: column;
            }

            .file-input-label {
                flex-direction: column;
                text-align: center;
            }

            .file-input-label svg {
                margin-right: 0;
                margin-bottom: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📄 Document AI Service</h1>
            <p>Validação Automática de Documentos com OCR</p>
        </div>

        <div class="content">
            <form id="validationForm">
                <div class="form-group">
                    <label for="tipoDocumento">Tipo de Documento:</label>
                    <select id="tipoDocumento" required>
                        <option value="">Selecione um tipo...</option>
                        <option value="CNH">CNH - Carteira Nacional de Habilitação</option>
                        <option value="RG">RG - Registro Geral</option>
                        <option value="CPF">CPF - Cadastro de Pessoa Física</option>
                        <option value="ASO">ASO - Atestado de Saúde Ocupacional</option>
                        <option value="PASSAPORTE">Passaporte</option>
                        <option value="OUTRO">Outro</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Selecione a Imagem do Documento:</label>
                    <div class="file-input-wrapper">
                        <label for="fileInput" class="file-input-label" id="dropZone">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                            </svg>
                            <div class="file-input-text">
                                <p class="main">Clique ou arraste a imagem aqui</p>
                                <p>Formatos suportados: JPG, PNG, PDF (máximo 5MB)</p>
                            </div>
                        </label>
                        <input type="file" id="fileInput" accept="image/*,.pdf" required>
                    </div>
                    <div class="file-preview" id="filePreview"></div>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn-validate">Validar Documento</button>
                    <button type="reset" class="btn-clear">Limpar</button>
                </div>
            </form>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Processando documento...</p>
            </div>

            <div class="error" id="error"></div>

            <div class="results" id="results">
                <div class="result-card" id="resultCard">
                    <div class="result-status" id="resultStatus"></div>

                    <div class="confidence-bar">
                        <div class="confidence-label">
                            <span>Nível de Confiança:</span>
                            <span id="confidenceValue">0%</span>
                        </div>
                        <div class="bar">
                            <div class="bar-fill" id="barFill" style="width: 0%"></div>
                        </div>
                    </div>

                    <div class="dados-extraidos" id="dadosExtraidos"></div>

                    <div class="motivos">
                        <h4>Motivos da Decisão:</h4>
                        <ul id="motivosList"></ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('validationForm');
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const filePreview = document.getElementById('filePreview');
        const loading = document.getElementById('loading');
        const error = document.getElementById('error');
        const results = document.getElementById('results');
        const resultCard = document.getElementById('resultCard');

        // Drag and drop
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            fileInput.files = e.dataTransfer.files;
            handleFileSelect();
        });

        fileInput.addEventListener('change', handleFileSelect);

        function handleFileSelect() {
            const file = fileInput.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                filePreview.innerHTML = '';
                if (file.type.startsWith('image/')) {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    filePreview.appendChild(img);
                } else {
                    filePreview.innerHTML = `<p>📄 ${file.name}</p>`;
                }
                filePreview.classList.add('show');
            };
            reader.readAsDataURL(file);
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const tipoDocumento = document.getElementById('tipoDocumento').value;
            const file = fileInput.files[0];

            if (!tipoDocumento || !file) {
                showError('Por favor, selecione o tipo de documento e a imagem');
                return;
            }

            // Converter arquivo para base64
            const reader = new FileReader();
            reader.onload = async (e) => {
                const base64 = e.target.result.split(',')[1];

                try {
                    loading.classList.add('show');
                    error.classList.remove('show');
                    results.classList.remove('show');

                    const response = await fetch('/api/validation', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            tipoDocumento: tipoDocumento,
                            base64Arquivo: base64
                        })
                    });

                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(errorData.error || 'Erro ao processar documento');
                    }

                    const data = await response.json();
                    displayResults(data);
                } catch (err) {
                    showError(err.message);
                } finally {
                    loading.classList.remove('show');
                }
            };
            reader.readAsDataURL(file);
        });

        function displayResults(data) {
            const statusEmoji = {
                'APROVADO': '✓',
                'ANÁLISE MANUAL': '⚠',
                'REPROVADO': '✗'
            };

            const statusClass = {
                'APROVADO': 'approved',
                'ANÁLISE MANUAL': 'manual',
                'REPROVADO': 'rejected'
            };

            resultCard.className = `result-card ${statusClass[data.status] || 'rejected'}`;

            document.getElementById('resultStatus').innerHTML = 
                `${statusEmoji[data.status] || '?'} ${data.status}`;

            const confidence = Math.round(data.confianca);
            document.getElementById('confidenceValue').textContent = `${confidence}%`;
            document.getElementById('barFill').style.width = `${confidence}%`;
            document.getElementById('barFill').textContent = `${confidence}%`;

            // Dados extraídos
            const dadosHtml = `
                <h4>Dados Extraídos:</h4>
                ${data.dadosExtraidos.nome ? `<div class="dados-item"><span class="dados-label">Nome:</span><span class="dados-value">${data.dadosExtraidos.nome}</span></div>` : ''}
                ${data.dadosExtraidos.validade ? `<div class="dados-item"><span class="dados-label">Validade:</span><span class="dados-value">${data.dadosExtraidos.validade}</span></div>` : ''}
                ${data.dadosExtraidos.numeroDocumento ? `<div class="dados-item"><span class="dados-label">Número:</span><span class="dados-value">${data.dadosExtraidos.numeroDocumento}</span></div>` : ''}
                ${data.dadosExtraidos.textoExtraido ? `<div class="dados-item"><span class="dados-label">Texto (primeiras linhas):</span><span class="dados-value">${data.dadosExtraidos.textoExtraido}...</span></div>` : ''}
            `;
            document.getElementById('dadosExtraidos').innerHTML = dadosHtml;

            // Motivos
            const motivosList = document.getElementById('motivosList');
            motivosList.innerHTML = data.motivos.map(m => `<li>${m}</li>`).join('');

            results.classList.add('show');
        }

        function showError(message) {
            error.textContent = message;
            error.classList.add('show');
        }

        // Limpar formulário
        form.addEventListener('reset', () => {
            filePreview.classList.remove('show');
            results.classList.remove('show');
            error.classList.remove('show');
        });
    </script>
</body>
</html>
